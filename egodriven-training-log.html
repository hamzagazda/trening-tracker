<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EGODRIVEN // Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0e;
  --surface:#17171a;
  --surface-2:#1f1f23;
  --border:#2c2c31;
  --text:#f1efe9;
  --text-dim:#8c8c94;
  --accent:#c9a227;
  --danger:#e0473c;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:70px;
}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 0;}
header.app-header{padding:6px 0 18px;border-bottom:1px solid var(--border);}
.brand{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;}
.brand .spade{color:var(--text-dim);letter-spacing:0;margin-left:4px;}
h1{font-family:'Oswald',sans-serif;font-size:30px;font-weight:600;letter-spacing:.04em;margin:4px 0 6px;text-transform:uppercase;}
.subtitle{font-size:13px;color:var(--text-dim);}
.weekend-banner{margin-top:14px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);font-size:13px;color:var(--text-dim);}

nav.day-nav{display:flex;gap:6px;overflow-x:auto;padding:14px 0;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.day-pill{flex:0 0 auto;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;padding:8px 14px;border-radius:2px;cursor:pointer;text-transform:uppercase;white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
.day-pill.active{background:var(--accent);color:#0c0c0e;border-color:var(--accent);font-weight:600;}
.day-pill .pip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:middle;}
.day-pill.active .pip{background:#0c0c0e;}

main{padding:18px 0 40px;}
.day-head{margin-bottom:16px;}
.day-head .label{font-family:'Oswald',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:.04em;}
.day-head .focus{font-size:13px;color:var(--text-dim);margin-top:2px;}

.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:12px;}
.ex-top{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.ex-num{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:13px;}
.ex-name{font-family:'Oswald',sans-serif;font-size:17px;text-transform:uppercase;letter-spacing:.02em;}
.ex-target{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);margin-bottom:6px;}
.ex-note{font-size:12.5px;color:var(--text-dim);margin-bottom:10px;line-height:1.4;font-style:italic;}

.spark{display:flex;align-items:flex-end;gap:3px;height:32px;margin-bottom:8px;}
.spark-bar{flex:1;background:var(--surface-2);border-top:2px solid var(--text-dim);min-height:10%;}
.spark-bar.spark-last{border-top-color:var(--accent);background:rgba(201,162,39,.15);}
.spark.empty{display:block;font-size:12px;color:var(--text-dim);height:auto;margin-bottom:8px;}

.ex-last{font-size:12.5px;color:var(--text-dim);margin-bottom:10px;}
.ex-last strong{color:var(--text);}
.delta{margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:12px;}
.delta.up{color:var(--accent);}
.delta.down{color:var(--danger);}
.delta.same{color:var(--text-dim);}

.log-form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.log-form input[type=date]{grid-column:1/-1;}
.log-form input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:9px 6px;border-radius:2px;width:100%;}
.log-form input::placeholder{color:var(--text-dim);}

.btn-save{width:100%;background:var(--accent);color:#0c0c0e;border:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:13px;font-weight:600;padding:10px;border-radius:2px;cursor:pointer;margin-bottom:6px;}
.btn-save:active{opacity:.85;}

.history-toggle{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:0;text-decoration:underline;font-family:'Inter',sans-serif;}
.history{display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:8px;}
.history.open{display:block;}
.history-row{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);padding:3px 0;gap:8px;}
.history-row .h-del{color:var(--danger);cursor:pointer;font-family:'Inter',sans-serif;flex:0 0 auto;}

.rest-card{background:var(--surface);border:1px solid var(--border);padding:28px 16px;text-align:center;}
.rest-card .label{font-family:'Oswald',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.rest-card p{font-size:13px;color:var(--text-dim);margin:0;}

.overview-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:13px;}
.overview-table th,.overview-table td{border-bottom:1px solid var(--border);padding:8px 4px;text-align:left;}
.overview-table th{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:.08em;color:var(--text-dim);}
.overview-table td.day-cell{font-family:'Oswald',sans-serif;letter-spacing:.02em;}
.guideline{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px;margin-bottom:10px;font-size:13px;line-height:1.5;}
.guideline strong{color:var(--accent);}

footer.app-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;justify-content:center;}
.app-footer button,.app-footer label{background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;display:inline-flex;align-items:center;}
.app-footer button.danger{color:var(--danger);}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div class="brand">EGODRIVEN <span class="spade">♠</span></div>
    <h1>Training Log</h1>
    <p class="subtitle">5 dana treninga · 2 dana odmora · progressive overload tracker</p>
  </header>

  <nav class="day-nav" id="dayNav"></nav>

  <main id="content"></main>
</div>

<footer class="app-footer">
  <button id="btnExport">Export</button>
  <label for="fileImport">Import
    <input type="file" id="fileImport" accept="application/json" style="display:none;">
  </label>
  <button id="btnReset" class="danger">Reset</button>
</footer>

<script>
// ---------- PLAN DATA ----------
const PUSH = [
  {id:'incline_bench', name:'Incline Barbell Bench Press', sets:3, repsTarget:'6-8', note:'Gornji dio prsa i ramena.'},
  {id:'machine_shoulder_press', name:'Machine Shoulder Press', sets:3, repsTarget:'10-12'},
  {id:'high_cable_lateral', name:'High Cable Lateral Raise', sets:4, repsTarget:'12-15', note:'Visoka pozicija sajle — max napetost u istegnutom položaju.'},
  {id:'db_lateral', name:'Dumbbell Lateral Raise', sets:3, repsTarget:'15-20', note:'Pokret prema van, ne prema gore — manje trapeza, više delta.'},
  {id:'overhead_cable_triceps', name:'Overhead Cable Triceps Extension', sets:3, repsTarget:'10-15', note:'Najbolja za sve tri glave tricepsa.'}
];

const PULL = [
  {id:'pullups', name:'Pull-ups (Zgibovi)', sets:3, repsTarget:'do otkaza', bodyweight:true, note:'Dodaj kg ako koristiš pojas, inače ostavi 0.'},
  {id:'chest_supported_row', name:'Chest Supported Row', sets:3, repsTarget:'10-12', note:'Stabilnost = bolja izolacija leđa.'},
  {id:'db_shrugs', name:'Dumbbell Shrugs', sets:4, repsTarget:'12-15', note:'Bučice blago ispred tijela — sliježi gore i unutra.'},
  {id:'face_pulls', name:'Face Pulls', sets:3, repsTarget:'15-20', note:'Seated ili lying. Ključno za zdravlje ramena i srednji trapez.'},
  {id:'bayesian_cable_curl', name:'Bayesian Cable Curl', sets:3, repsTarget:'10-12', note:'Za duge mišiće bicepsa.'}
];

const NOGE = [
  {id:'squat', name:'Squat (Čučanj)', sets:3, repsTarget:'6-8'},
  {id:'rdl', name:'Romanian Deadlift', sets:3, repsTarget:'8-10'},
  {id:'leg_extension', name:'Leg Extension', sets:3, repsTarget:'12-15'},
  {id:'cable_crunch', name:'Cable Crunch', sets:4, repsTarget:'10-12', note:'Progresivno dodaj težinu — ovo je ključno.'}
];

const GORNJI = [
  {id:'seated_cable_lateral', name:'Seated Cable Lateral Raise', sets:4, repsTarget:'12-15', note:'Veća stabilnost od stojeće verzije.'},
  {id:'cable_shrugs', name:'Cable Shrugs', sets:4, repsTarget:'12-15', note:'Bolji smjer sile za kosa vlakna trapeza.'},
  {id:'reverse_pec_deck', name:'Reverse Pec Deck', sets:3, repsTarget:'15-20', note:'Zadnje rame + gornji dio leđa.'},
  {id:'hanging_leg_raise', name:'Hanging Leg Raise', sets:4, repsTarget:'10-20', note:'Preteško? Radi s pogrčenim koljenima.'},
  {id:'diamond_pushups', name:'Diamond Push-ups', sets:2, repsTarget:'do otkaza', bodyweight:true, note:'Finišer za triceps i prsa.'}
];

const DONJI = [
  {id:'leg_press_hack', name:'Leg Press / Hack Squat', sets:3, repsTarget:'10-12'},
  {id:'seated_leg_curl', name:'Seated Leg Curl', sets:3, repsTarget:'12-15'},
  {id:'standing_calf_raise', name:'Standing Calf Raise', sets:4, repsTarget:'10-15'},
  {id:'long_lever_plank', name:'Long Lever Plank', sets:3, repsTarget:'vrijeme', unit:'sec', bodyweight:true, note:'Stisni gluteus i trbuh maksimalno.'},
  {id:'weighted_crunches', name:'Weighted Crunches', sets:3, repsTarget:'15-20'}
];

const DAYS = [
  {key:'pon', label:'PON', full:'Ponedjeljak', focus:'Push — prsa, ramena (lateralni fokus), triceps', exercises:PUSH},
  {key:'uto', label:'UTO', full:'Utorak', focus:'Pull — leđa, trapez fokus, biceps', exercises:PULL},
  {key:'sri', label:'SRI', full:'Srijeda', focus:'Noge + trbušnjaci', exercises:NOGE},
  {key:'cet', label:'ČET', full:'Četvrtak', focus:'Gornji dio — ramena, trapez, abs', exercises:GORNJI},
  {key:'pet', label:'PET', full:'Petak', focus:'Donji dio + trbušnjaci', exercises:DONJI}
];

// ---------- STORAGE ----------
const STORAGE_KEY = 'egodriven_training_log_v1';
let logs = {};
try { logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ logs = {}; }
function persist(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); }catch(e){} }

function history(id){ return (logs[id]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)); }
function metricKey(ex){ return ex.bodyweight ? 'reps' : 'weight'; }
function fmtDate(iso){ const p = iso.split('-'); return p[2]+'.'+p[1]+'.'; }

// ---------- STATE ----------
const openHistory = new Set();
function dayKeyToday(){
  const map = {1:'pon',2:'uto',3:'sri',4:'cet',5:'pet'};
  return map[new Date().getDay()] || 'overview';
}
let activeKey = dayKeyToday();

// ---------- RENDER ----------
function renderNav(){
  const todayKey = dayKeyToday();
  let html = '';
  DAYS.forEach(d=>{
    html += `<button class="day-pill ${d.key===activeKey?'active':''}" data-day="${d.key}">${d.label}${d.key===todayKey?'<span class="pip"></span>':''}</button>`;
  });
  html += `<button class="day-pill ${activeKey==='overview'?'active':''}" data-day="overview">RASPORED</button>`;
  document.getElementById('dayNav').innerHTML = html;
}

function renderSpark(ex, hist){
  const recent = hist.slice(-8);
  if(recent.length===0){
    return '<div class="spark empty">Nema unosa — ovo je tvoj baseline.</div>';
  }
  const mk = metricKey(ex);
  const vals = recent.map(h => Number(h[mk]) || 0);
  const max = Math.max.apply(null, vals);
  const min = Math.min.apply(null, vals);
  const range = (max - min) || 1;
  const bars = recent.map((h,i)=>{
    const v = Number(h[mk]) || 0;
    const pct = Math.max(10, Math.round(((v - min) / range) * 100));
    const cls = (i===recent.length-1) ? 'spark-bar spark-last' : 'spark-bar';
    return `<div class="${cls}" style="height:${pct}%" title="${fmtDate(h.date)}: ${v}"></div>`;
  }).join('');
  return `<div class="spark">${bars}</div>`;
}

function renderLast(ex, hist){
  const last = hist[hist.length-1];
  if(!last) return '<div class="ex-last">Nema prethodnih unosa.</div>';
  const prev = hist[hist.length-2];
  const wStr = ex.bodyweight ? (Number(last.weight) > 0 ? `BW+${last.weight}kg` : 'BW') : `${last.weight}kg`;
  const rStr = ex.unit==='sec' ? `${last.reps}s` : `${last.reps}rep`;
  const rpeStr = (last.rpe !== null && last.rpe !== undefined && last.rpe !== '') ? ` @RPE${last.rpe}` : '';
  let deltaHtml = '';
  if(prev){
    const mk = metricKey(ex);
    const diff = (Number(last[mk]) || 0) - (Number(prev[mk]) || 0);
    const unit = ex.bodyweight ? 'rep' : 'kg';
    if(diff > 0) deltaHtml = `<span class="delta up">▲ +${diff}${unit}</span>`;
    else if(diff < 0) deltaHtml = `<span class="delta down">▼ ${diff}${unit}</span>`;
    else deltaHtml = `<span class="delta same">— isto</span>`;
  }
  return `<div class="ex-last">Posljednje (${fmtDate(last.date)}): <strong>${wStr} × ${rStr}${rpeStr}</strong> ${deltaHtml}</div>`;
}

function renderHistoryRows(ex, hist){
  let rows = '';
  const rev = hist.slice().reverse();
  rev.forEach((h, i) => {
    const realIndex = hist.length - 1 - i;
    const wStr = ex.bodyweight ? (Number(h.weight) > 0 ? `BW+${h.weight}kg` : 'BW') : `${h.weight}kg`;
    const rStr = ex.unit==='sec' ? `${h.reps}s` : `${h.reps}rep`;
    const rpeStr = (h.rpe !== null && h.rpe !== undefined && h.rpe !== '') ? ` @RPE${h.rpe}` : '';
    rows += `<div class="history-row"><span>${fmtDate(h.date)} — ${wStr} × ${rStr}${rpeStr}</span><span class="h-del" data-del="${ex.id}" data-idx="${realIndex}">✕</span></div>`;
  });
  return rows;
}

function renderExCard(ex, idx){
  const hist = history(ex.id);
  const today = new Date().toISOString().slice(0,10);
  const weightPlaceholder = ex.bodyweight ? '+kg' : 'kg';
  const repsPlaceholder = ex.unit==='sec' ? 'sec' : 'rep';
  const histOpen = openHistory.has(ex.id) ? 'open' : '';

  return `
  <div class="ex-card">
    <div class="ex-top">
      <span class="ex-num">${String(idx+1).padStart(2,'0')}</span>
      <span class="ex-name">${ex.name}</span>
    </div>
    <div class="ex-target">${ex.sets} × ${ex.repsTarget}</div>
    ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
    ${renderSpark(ex, hist)}
    ${renderLast(ex, hist)}
    <div class="log-form">
      <input type="date" data-field="date" value="${today}">
      <input type="number" data-field="weight" placeholder="${weightPlaceholder}" step="0.5" min="0">
      <input type="number" data-field="reps" placeholder="${repsPlaceholder}" step="1" min="0">
      <input type="number" data-field="rpe" placeholder="RPE" step="0.5" min="1" max="10">
    </div>
    <button class="btn-save" data-save="${ex.id}">Spremi unos</button>
    ${hist.length>0 ? `<button class="history-toggle" data-toggle="${ex.id}">Historija (${hist.length})</button>
    <div class="history ${histOpen}" id="hist-${ex.id}">${renderHistoryRows(ex, hist)}</div>` : ''}
  </div>`;
}

function renderOverview(){
  let rows = '';
  DAYS.forEach(d=>{
    rows += `<tr><td class="day-cell">${d.full}</td><td>${d.focus}</td></tr>`;
  });
  return `
  <div class="day-head"><div class="label">Tjedni raspored</div><div class="focus">5 dana treninga, 2 dana odmora</div></div>
  <table class="overview-table">
    <thead><tr><th>Dan</th><th>Fokus</th></tr></thead>
    <tbody>${rows}<tr><td class="day-cell">Subota / Nedjelja</td><td>Odmor</td></tr></tbody>
  </table>
  <div class="guideline"><strong>Intenzitet (RPE):</strong> većinu serija završi na RPE 9–10 — stani tek kad si na jedno ponavljanje od otkaza ili kad više ne možeš pravilno izvesti pokret.</div>
  <div class="guideline"><strong>Progresivno opterećenje:</strong> svaki tjedan dodaj malo težine ili barem jedno ponavljanje više na svakoj vježbi. Bez toga nema rasta.</div>
  `;
}

function renderRest(){
  const isSat = new Date().getDay() === 6;
  return `<div class="rest-card"><div class="label">${isSat?'Subota':'Nedjelja'} — Odmor</div><p>Nema treninga danas. Iskoristi za san, hidrataciju i pripremu za sljedeći tjedan.</p></div>`;
}

function render(){
  renderNav();
  const main = document.getElementById('content');
  if(activeKey === 'overview'){
    main.innerHTML = renderOverview();
    return;
  }
  const day = DAYS.find(d => d.key === activeKey);
  let html = `<div class="day-head"><div class="label">${day.full}</div><div class="focus">${day.focus}</div></div>`;
  day.exercises.forEach((ex,i) => { html += renderExCard(ex,i); });
  main.innerHTML = html;
}

// ---------- EVENTS ----------
document.getElementById('dayNav').addEventListener('click', e=>{
  const btn = e.target.closest('.day-pill');
  if(!btn) return;
  activeKey = btn.dataset.day;
  render();
});

document.getElementById('content').addEventListener('click', e=>{
  // save entry
  if(e.target.matches('[data-save]')){
    const id = e.target.dataset.save;
    const card = e.target.closest('.ex-card');
    const date = card.querySelector('[data-field="date"]').value;
    const weight = card.querySelector('[data-field="weight"]').value;
    const reps = card.querySelector('[data-field="reps"]').value;
    const rpe = card.querySelector('[data-field="rpe"]').value;
    if(!date || reps === ''){
      alert('Upiši datum i broj ponavljanja (ili sekundi za plank).');
      return;
    }
    if(!logs[id]) logs[id] = [];
    logs[id].push({
      date: date,
      weight: weight === '' ? 0 : Number(weight),
      reps: Number(reps),
      rpe: rpe === '' ? null : Number(rpe)
    });
    persist();
    render();
    return;
  }
  // toggle history
  if(e.target.matches('[data-toggle]')){
    const id = e.target.dataset.toggle;
    const el = document.getElementById('hist-'+id);
    el.classList.toggle('open');
    if(el.classList.contains('open')) openHistory.add(id);
    else openHistory.delete(id);
    return;
  }
  // delete history entry
  if(e.target.matches('[data-del]')){
    const id = e.target.dataset.del;
    const idx = Number(e.target.dataset.idx);
    if(confirm('Obriši ovaj unos?')){
      logs[id].splice(idx, 1);
      persist();
      render();
    }
    return;
  }
});

// export / import / reset
document.getElementById('btnExport').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(logs, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `egodriven-log-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(confirm('Ovo će zamijeniti trenutne podatke uvezenim. Nastaviti?')){
        logs = data;
        persist();
        render();
      }
    }catch(err){
      alert('Neispravan fajl.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btnReset').addEventListener('click', ()=>{
  if(confirm('Obriši SVE zapisane podatke o treninzima? Ovo se ne može vratiti.')){
    logs = {};
    persist();
    render();
  }
});

// weekend banner
if([0,6].includes(new Date().getDay())){
  const banner = document.createElement('div');
  banner.className = 'weekend-banner';
  banner.textContent = 'Danas je dan odmora. Otvori "RASPORED" za pregled tjedna ili izaberi dan da upišeš zakašnjeli unos.';
  document.querySelector('header.app-header').after(banner);
}

render();
</script>
</body>
</html>
